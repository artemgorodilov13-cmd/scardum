<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCARDUM — Скоро здесь будет база</title>
    <style>
        /* ==========================================================================
           1. ЦВЕТОВЫЕ ПЕРЕМЕННЫЕ (ТОКЕНЫ)
           ========================================================================== */
        :root {
            /* ТЕМНАЯ ТЕМА (По умолчанию) */
            --bg-body: #0b0c10;
            --bg-card: #1f2833;
            --border-card: #1e3a45;          /* Смягчили ядовитый цвет рамки */
            --border-hover: #66fcf1;
            
            --color-logo: #66fcf1;
            --color-subtitle: #a0aec0;      /* Спокойный подзаголовок */
            --color-heading: #ffffff;       /* Заголовки игр теперь БЕЛЫЕ и читаемые */
            --color-text: #cbd5e1;          /* Текст описания — мягкий светлый */
            
            --badge-bg: #132d35;            /* Приглушенный фон плашки */
            --badge-text: #2e2e2e;          /* Яркий текст плашки */
            --shadow: rgba(0, 0, 0, 0.4);
            --shadow-hover: rgba(102, 252, 241, 0.4);
        }

        body.light-theme {
            /* СВЕТЛАЯ ТЕМА (Комфортная и благородная) */
            --bg-body: #f4f7f6;             /* Мягкий светло-серый с каплей зеленого */
            --bg-card: #ffffff;             /* Чисто белые карточки */
            --border-card: #e2e8f0;         /* Тонкая аккуратная серая рамка */
            --border-hover: #0d9488;        /* Глубокий бирюзовый при наведении */
            
            --color-logo: #0f766e;          /* Темный красивый тил для лого */
            --color-subtitle: #4a5568;      /* Читаемый темный подзаголовок */
            --color-heading: #1a202c;       /* Почти черный для названий игр */
            --color-text: #2d3748;          /* Комфортный графитовый для описания */
            
            --badge-bg: #ccfbf1;            /* Пастельный фон плашки */
            --badge-text: #115e59;          /* Темно-зеленый текст плашки */
            --shadow: rgba(0, 0, 0, 0.05);
            --shadow-hover: rgba(13, 148, 136, 0.2);
        }

        /* ==========================================================================
           2. ОСНОВНЫЕ СТИЛИ
           ========================================================================== */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-body); 
            color: var(--color-text); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container { text-align: center; max-width: 800px; width: 100%; }
        
        h1 { 
            color: var(--color-logo); 
            font-size: 4rem; 
            margin: 0; 
            font-family: monospace; 
            letter-spacing: 5px; 
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.2);
            transition: color 0.3s ease;
        }
        
        p { 
            color: var(--color-subtitle); 
            font-size: 1.2rem; 
            margin-top: 10px; 
            line-height: 1.6;
        }
        
        .games-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .game-screenshot-box {
            width: 100%;
            max-width: 800px;
            margin-top: 25px;
            margin-bottom: 35px;
            border-radius: 8px;
            border: 1px solid var(--border-card);
            box-shadow: 0 0 15px var(--shadow);
            box-sizing: border-box;
        }

        .game-img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 7px;
        } 
        
        .game-card {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 12px;
            width: 280px;
            padding: 24px;
            text-align: left;
            text-decoration: none;
            color: var(--color-text);
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px var(--shadow);
            line-height: 1.5;
        }
        
        .game-card:hover {
            transform: translateY(-5px);
            border-color: var(--border-hover);
            box-shadow: 0 10px 20px var(--shadow-hover);
        }
        
        .game-card h3 {
            color: var(--color-heading);
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 1.4rem;
            transition: color 0.3s ease;
        }
        
        .game-badge {
    	    display: inline-block;
    	    padding: 4px 10px;
    	    background: #254e58;
    	    color: #66fcf1;
    	    border-radius: 5px;
    	    font-size: 0.8rem;
    	    font-weight: bold;
    	    margin-bottom: 10px;
    	    transition: all 0.3s ease;
	}

	body.light-theme .game-badge {
	    background-color: #ccfbf1 !important;
	    color: #115e59 !important;
    	    border: 1px solid #99f6e4 !important;
	}

        /* Кнопка переключения темы (Тестовая) */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 16px;
            background: var(--bg-card);
            color: var(--color-text);
            border: 1px solid var(--border-card);
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px var(--shadow);
        }

        .status { 
            margin-top: 50px; 
            display: inline-block; 
            padding: 8px 20px; 
            background: #1f2833; 
            border: 1px solid #66fcf1; 
            border-radius: 20px; 
            font-size: 0.9rem; 
            color: #66fcf1; 
            transition: 0.2s;
        }
        .status:hover {
            background: #66fcf1;
            color: #0b0c10;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.5);
        }
        a { text-decoration: none; }

	.header-top {
    	     position: absolute;
    	     top: 10px;
    	     right: 10px;
	     z-index: 999;
	}

	.theme-switch {
    	     position: relative;
    	     display: inline-block;
    	     width: 50px;
    	     height: 26px;
	}
	.theme-switch input { opacity: 0; width: 0; height: 0; }
	.slider {
    		position: absolute; cursor: pointer;
    		top: 0; left: 0; right: 0; bottom: 0;
    		background-color: #444; transition: 0.4s; border-radius: 34px;
	}
	.slider:before {
    		position: absolute; content: "";
    		height: 18px; width: 18px; left: 4px; bottom: 4px;
    		background-color: #fff; transition: 0.4s; border-radius: 50%;
	}
	input:checked + .slider { background-color: #ccc; }
	input:checked + .slider:before { transform: translateX(24px); background-color: #ff9800; }

	body.light-theme {
    	background-color: #f4f7f6;
    	color: #1a202c;
	}

	/* Карточки в светлой теме */
	.card.light-theme {
   	    background-color: #ffffff;
    	    border: 1px solid #e2e8f0;
    	    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
	}

	.card-title.light-theme {
    	    color: #0d9488;
	}

	.badge.light-theme {
    	    background-color: #ccfbf1;
            color: #115e59;
	}

        .search-container {
            margin: 20px 0;
            width: 100%;
            max-width: 400px;
            display: inline-block;
        }

        #game-search {
            width: 100%;
            padding: 12px 20px;
            background: #1f2833 !important;
            border: 1px solid #45f3ff !important;
            border-radius: 25px;
            color: #ffffff !important;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body.light-theme #game-search {
            background: #ffffff !important;
            border: 1px solid #cbd5e1 !important;
            color: #1a202c !important;
        }
        
        body.light-theme #game-search::placeholder {
            color: #718096 !important;
        }

        .game-card.ds-special {
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        .game-card.ds-special:hover {
            background: #040405 !important;
            border-color: #1c1d22 !important;
            box-shadow: 0 0 30px rgba(0, 0, 0, 1), 
                        0 0 50px rgba(0, 0, 0, 0.9), 
                        0 0 15px rgba(255, 0, 0, 0.15) !important;
            transform: translateY(-3px) scale(0.99);
        }
        
        .game-card.ds-special:hover h3 {
            color: #8a0303 !important;
            text-shadow: 0 0 8px rgba(138, 3, 3, 0.4);
        }
        
        .game-card.ds-special:hover .game-card-text {
            color: #55565a !important;
        }
        
        @media (max-width: 480px) {
            body {
                padding-top: 80px;
            }
            .header-top {
                right: 50%;
                transform: translateX(50%);
            }
            h1 {
                font-size: 2.6rem !important;
                letter-spacing: 3px;
                margin-top: 25px;
            }
        }

        .game-card.ds-special .game-badge {
            background-color: #1a0505 !important;
            color: #ff4d4d !important;
            border: 1px solid #8a0303 !important;
        }

        .game-card.ds-special:hover .game-badge {
            background-color: #8a0303 !important;
            color: #ffffff !important;
            box-shadow: 0 0 10px rgba(138, 3, 3, 0.6);
        }

        body.light-theme .game-card.ds-special .game-badge {
            background-color: #fee2e2 !important;
            color: #991b1b !important;
            border: 1px solid #fca5a5 !important;
        }
    </style>
</head>
<body>
    <div class="header-top">
        <label class="theme-switch">
            <input type="checkbox" id="theme-toggle">
            <span class="slider"></span>
        </label>

    </div>
    <div class="container">
        <h1>SCARDUM</h1>
        <p>Карточки, которые хочется читать снова и снова.</p>

	<div class="search-container">
	    <input type="text" id="game-search" placeholder="Поиск...">
	</div>
        
        <!-- Сетка с карточками игр -->
        <div class="games-grid">
            <!-- Начало сетки для карточек -->
        <!-- Сетка с карточками игр -->
        <div class="games-grid">
            
            {% for game in games %}
                <!-- Flask сам размножит этот блок для каждой игры из базы данных -->
                <a href="/game/{{ game.slug }}" class="game-card {% if game.is_special %}ds-special{% endif %}">
                    <span class="game-badge">{{ game.badge }}</span>
                    <h3>{{ game.title }}</h3>
                    <div class="game-card-text">
                        {{ game.short_text }}
                    </div>
                </a>
            {% endfor %}

        </div>


<div style="width: 100%; text-align: center; margin-top: 30px;">
    <a href="#" class="status">Статус сервера: Разработка на localhost</a>
</div>

<script>
    const searchInput = document.getElementById('game-search');
    
    if (searchInput) {
        searchInput.addEventListener('input', () => {
            const filter = searchInput.value.toLowerCase().trim();
            const cards = document.querySelectorAll('.game-card');

            cards.forEach(card => {
                const titleElement = card.querySelector('h3');
                const textElement = card.querySelector('.game-card-text');
                
                if (titleElement) {
                    const title = titleElement.innerText.toLowerCase();
                    const text = textElement ? textElement.innerText.toLowerCase() : '';
                    
                    if (title.includes(filter) || text.includes(filter)) {
                        card.style.display = 'block'; 
                    } else {
                        card.style.display = 'none';
                    }
                }
            });
        });
    }

    const themeToggle = document.getElementById('theme-toggle');

    const savedTheme = localStorage.getItem('scardum-theme');
    if (savedTheme === 'light') {
        document.body.classList.add('light-theme');
        if (themeToggle) {
            themeToggle.checked = true;
        }
    }

    if (themeToggle) {
        themeToggle.addEventListener('change', () => {
            if (themeToggle.checked) {
                document.body.classList.add('light-theme');
                localStorage.setItem('scardum-theme', 'light');
            } else {
                document.body.classList.remove('light-theme');
                localStorage.setItem('scardum-theme', 'dark');
            }
        });
    }
</script>

</body>
</html>
